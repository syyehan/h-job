<!DOCTYPE html>
<html>
<head>
    <title>调度日志管理</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/font-awesome.min.css">
    <link rel="stylesheet" href="../plugins/layer/skin/default/layer.css">
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="container-fluid" style="margin-top: 10px;">
    <h2 style="font-weight: bold; font-size: 24px; margin: 0;"><i class="fa fa-list-alt" style="color: #f39c12;"></i> 调度日志</h2>

    <div class="row" style="margin-top: 10px;">
        <div class="col-sm-4">
            <select class="form-control" id="q_jobId">
                <option value="">全部任务</option>
            </select>
        </div>
        <div class="col-sm-3">
            <select class="form-control" id="q_executorCode">
                <option value="">全部状态</option>
                <option value="0">成功</option>
                <option value="1">进行中</option>
                <option value="2">失败</option>
            </select>
        </div>
        <div class="col-sm-1">
            <button class="btn btn-primary" id="btn_query"><i class="fa fa-search"></i> 查询</button>
        </div>
        <div class="col-sm-1">
            <button class="btn btn-default" id="btn_reset"><i class="fa fa-refresh"></i> 重置</button>
        </div>
<!--        <div class="col-sm-1">-->
<!--            <button class="btn btn-warning" id="btn_clear"><i class="fa fa-trash"></i> 清空日志</button>-->
<!--        </div>-->
    </div>

    <div class="row" style="margin-top: 10px;">
        <div class="col-xs-12">
            <table class="table table-bordered table-hover" id="dataTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>任务</th>
                    <th>任务ID</th>
                    <th>执行地址</th>
                    <th>分片参数</th>
                    <th>重试次数</th>
                    <th>执行时间</th>
                    <th>返回码</th>
                    <th>执行状态</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="row" style="margin-top: 10px;">
        <div class="col-sm-6">
            <!-- 左侧留空 -->
        </div>
        <div class="col-sm-6">
            <nav style="text-align: right;">
                <ul class="pagination" id="pagination"></ul>
            </nav>
        </div>
    </div>
</div>

<!-- 详情弹窗 -->
<div id="detailModalDiv" style="display:none;">
    <table class="table table-bordered">
        <tbody>
        <tr><th style="width:30%">ID</th><td id="detail_id"></td></tr>
        <tr><th>任务描述</th><td id="detail_jobDesc"></td></tr>
        <tr><th>任务ID</th><td id="detail_jobId"></td></tr>
        <tr><th>执行地址</th><td id="detail_address"></td></tr>
        <tr><th>分片参数</th><td id="detail_sharding"></td></tr>
        <tr><th>重试次数</th><td id="detail_failRetryCount"></td></tr>
        <tr><th>执行参数</th><td id="detail_param"></td></tr>
        <tr><th>执行时间</th><td id="detail_executorDate"></td></tr>
        <tr><th>执行状态</th><td id="detail_executorCode"></td></tr>
        <tr><th>返回码</th><td id="detail_resultCode"></td></tr>
        <tr><th>返回信息</th><td id="detail_resultMsg"></td></tr>
        </tbody>
    </table>
</div>

<script src="../libs/jquery.min.js"></script>
<script src="../plugins/layer/layer.js"></script>
<script src="../libs/bootstrap.min.js"></script>
<script src="../js/common.js"></script>
<script src="../js/common/pagination.js"></script>
<script src="../js/job_log.js"></script>
</body>
</html>
