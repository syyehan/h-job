<!DOCTYPE html>
<html>
<head>
    <title>服务地址管理</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/font-awesome.min.css">
    <link rel="stylesheet" href="../plugins/layer/skin/default/layer.css">
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="container-fluid" style="margin-top: 10px;">
    <h2 style="font-weight: bold; font-size: 24px; margin: 0;"><i class="fa fa-server" style="color: #3498db;"></i> 执行器地址</h2>

    <div class="row" style="margin-top: 10px;">
        <div class="col-sm-2">
            <input type="text" class="form-control" id="q_serviceName" placeholder="服务名称">
        </div>
        <div class="col-sm-2">
            <input type="text" class="form-control" id="q_title" placeholder="业务名称">
        </div>
        <div class="col-sm-1">
            <button class="btn btn-primary" id="btn_query"><i class="fa fa-search"></i> 查询</button>
        </div>
        <div class="col-sm-1">
            <button class="btn btn-default" id="btn_reset"><i class="fa fa-refresh"></i> 重置</button>
        </div>
        <div class="col-sm-1">
            <button class="btn btn-success" id="btn_add"><i class="fa fa-plus"></i> 新增</button>
        </div>
        <div class="col-sm-1">
<!--            <button class="btn btn-warning" id="btn_update"><i class="fa fa-pencil-square-o"></i> 修改</button>-->
        </div>
<!--        <div class="col-sm-1">-->
<!--            <button class="btn btn-danger" id="btn_del"><i class="fa fa-trash-o"></i> 删除</button>-->
<!--        </div>-->
    </div>

    <div class="row" style="margin-top: 10px;">
        <div class="col-xs-12">
            <table class="table table-bordered table-hover" id="dataTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>服务名称</th>
                    <th>业务名称</th>
                    <th>地址类型</th>
                    <th>Nacos命名空间</th>
                    <th>Nacos分组</th>
                    <th>地址列表</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="row" style="margin-top: 10px;">
        <div class="col-sm-6">
            <!-- 留空，让分页靠右 -->
        </div>
        <div class="col-sm-6">
            <nav style="text-align: right;">
                <ul class="pagination" id="pagination"></ul>
            </nav>
        </div>
    </div>
</div>

<div id="modalDiv" style="display:none;">
    <form class="form-horizontal" id="form1">
        <div class="form-group">
            <label class="col-sm-2 control-label">服务名称 <span style="color: red;">*</span></label>
            <div class="col-sm-10">
                <input type="text" class="form-control" name="serviceName" placeholder="服务名称">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">业务名称 <span style="color: red;">*</span></label>
            <div class="col-sm-10">
                <input type="text" class="form-control" name="title" placeholder="业务名称">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">地址类型 <span style="color: red;">*</span></label>
            <div class="col-sm-10">
                <select class="form-control" name="addressType">
                    <option value="0">自动注册</option>
                    <option value="1">手动录入</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">Nacos命名空间</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" name="nacosNamespace" placeholder="public,自动注册(必填)">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">Nacos分组</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" name="nacosGroup" placeholder="DEFAULT_GROUP,自动注册(必填)">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">地址列表</label>
            <div class="col-sm-10">
                <textarea class="form-control" name="addressList" placeholder="多个地址用逗号分隔,手动录入(必填)" rows="3"></textarea>
            </div>
        </div>
    </form>
</div>

<script src="../libs/jquery.min.js"></script>
<script src="../plugins/layer/layer.js"></script>
<script src="../libs/bootstrap.min.js"></script>
<script src="../js/common.js"></script>
<script src="../js/common/pagination.js"></script>
<script src="../js/server_address.js"></script>
</body>
</html>
