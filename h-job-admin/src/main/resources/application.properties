
server.port=9009
spring.application.name=h-job-admin
server.servlet.context-path=/h-job

# Nacos 服务器配置
spring.cloud.nacos.discovery.server-addr=${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:127.0.0.1:8848}
spring.cloud.nacos.discovery.namespace=uat
spring.cloud.nacos.discovery.group=uat
spring.cloud.nacos.discovery.username=nacos
spring.cloud.nacos.discovery.password=nacos

### datasource-pool
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariCP
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=1000

# MySQL配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST_PORT:127.0.0.1:3306}/h-job?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=GMT%2B8
spring.datasource.username=root
spring.datasource.password=123456
### mybatis
mybatis.mapper-locations=classpath:/mybatis-mapper/*Mapper.xml
# 定时任务用户名和密码
h.job.user.name=admin
h.job.user.password=123456

h.job.young.pool.core=10
h.job.young.pool.capacity=2000
h.job.young.pool.max=200
h.job.middle.pool.core=10
h.job.middle.pool.capacity=2000
h.job.middle.pool.max=200
h.job.old.pool.core=10
h.job.old.pool.capacity=2000
h.job.old.pool.max=200



# Spring MVC 路径匹配配置(修复 Knife4j 兼容性)
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

knife4j.enable=true
# 生产环境建议关闭（通过 Profile 控制）
knife4j.production=false
knife4j.basic.enable=true
knife4j.basic.username=admin
knife4j.basic.password=123456
